<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#16A34A"/>
    </linearGradient>
    <linearGradient id="routeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A66FF"/>
      <stop offset="100%" style="stop-color:#00C6FF"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#routeGrad)" stroke-width="6" opacity="0.3"/>
  
  <!-- Route Path -->
  <path d="M50 200 Q130 120 200 200 Q270 280 350 200" fill="none" stroke="url(#routeGrad)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Route Dots -->
  <circle cx="130" cy="160" r="10" fill="#00C6FF" opacity="0.9"/>
  <circle cx="200" cy="200" r="12" fill="#0A66FF" opacity="0.9"/>
  <circle cx="270" cy="240" r="10" fill="#00C6FF" opacity="0.9"/>
  
  <!-- Green Leaf -->
  <path d="M200 110 C230 110 260 140 260 180 C260 220 230 240 200 230 C170 240 140 220 140 180 C140 140 170 110 200 110Z" 
        fill="url(#leafGrad)" opacity="0.95"/>
  
  <!-- Leaf Vein -->
  <line x1="200" y1="116" x2="200" y2="224" stroke="#FFFFFF" stroke-width="4" opacity="0.7"/>
  <line x1="200" y1="160" x2="230" y2="150" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
  <line x1="200" y1="170" x2="170" y2="160" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
  <line x1="200" y1="190" x2="236" y2="190" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
  <line x1="200" y1="200" x2="164" y2="200" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
  
  <!-- Leaf Stem -->
  <line x1="200" y1="230" x2="200" y2="265" stroke="#16A34A" stroke-width="8" stroke-linecap="round"/>
  
  <!-- AI Spark -->
  <circle cx="250" cy="130" r="8" fill="#00C6FF" opacity="0.9"/>
  <circle cx="266" cy="114" r="5" fill="#0A66FF" opacity="0.7"/>
  <circle cx="295" cy="102" r="4" fill="#22C55E" opacity="0.6"/>
  
  <!-- Spark lines -->
  <line x1="258" y1="122" x2="272" y2="106" stroke="#00C6FF" stroke-width="3" opacity="0.8"/>
  <line x1="264" y1="128" x2="284" y2="118" stroke="#0A66FF" stroke-width="3" opacity="0.6"/>
  
  <!-- Bottom Text - Larger -->
  <text x="200" y="340" text-anchor="middle" font-family="'Segoe UI', 'Poppins', Arial, sans-serif" font-size="32" font-weight="800" fill="#FFFFFF" letter-spacing="2">
    CleanRoute-AI
  </text>
  <text x="200" y="368" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#9CA3AF" letter-spacing="3">
    SMART WASTE MANAGEMENT
  </text>
</svg>
